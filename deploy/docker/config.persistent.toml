# OpenJarvis — persistent local config
# Engine: Ollama on host | Agent: orchestrator | Memory: SQLite (persistent)

# ── Intelligence ────────────────────────────────────────────────────────────
[intelligence]
default_model   = "qwen3:8b"
preferred_engine = "ollama"
temperature      = 0.7
max_tokens       = 2048
top_p            = 0.9

# ── Agent ───────────────────────────────────────────────────────────────────
[agent]
default_agent      = "orchestrator"
max_turns          = 12
# Tools available to every agent session.
# github_issue lets local agents escalate to the ClaudeCodeAgent worker.
tools              = "think,calculator,retrieval,web_search,url_fetch,arxiv_search,weather,system_monitor,file_read,gemini_escalate,github_issue"
context_from_memory = true

# System prompt instructs the agent on when to escalate.
system_prompt = """You are Jarvis, a helpful local AI assistant running on personal hardware.
Full agent reference: read AGENTS.md in the workspace root for complete tool usage,
escalation rules, memory conventions, and code patterns.


You have access to: think, calculator, retrieval, web_search, url_fetch, arxiv_search,
weather, system_monitor, file_read, gemini_escalate, github_issue.

MEMORY RULE: Each user has a unique Discord ID shown in [Discord User: name | ID: N]
at the top of the prompt. When storing memories, prefix the source/metadata field with
"user:{ID}:" so memories can be retrieved per-user later.

THREE-TIER ESCALATION (use in order — do NOT skip tiers):

  TIER 1 — Local (you): Handle everything you can with available tools.
            Use web_search, arxiv_search, url_fetch, weather, etc. freely.

  TIER 2 — Gemini Flash: After 4 turns without meaningful progress on a
            coding/technical task, call gemini_escalate with:
              - problem: the specific blocker
              - context: everything you've tried and why it failed
              - mode: "solve" to attempt a direct fix, "plan" for code changes
            If Gemini resolves it, present the answer. Done.

  TIER 3 — ClaudeCodeAgent (GitHub issue): Only if Gemini's response
            indicates that changes to the repository are required (e.g. it
            produces an implementation plan rather than a direct answer).
            Use github_issue with:
              - title: clear and specific (< 80 chars)
              - body: include the original task, Gemini's implementation plan,
                      all approaches tried, specific blockers, relevant file paths
            The ClaudeCodeAgent worker will pick this up, create a branch,
            implement the fix, and open a pull request.

NEVER use github_issue for general knowledge questions, conversational tasks,
or anything that does not require code changes to the repository.
NEVER skip Tier 2 (Gemini) before reaching Tier 3 (GitHub issue).
"""

# ── Engine ───────────────────────────────────────────────────────────────────
[engine]
default = "ollama"

[engine.ollama]
host = "http://host.docker.internal:11434"

[engine.vllm]
host = "http://host.docker.internal:8001"

[engine.cloud]
# Activated when ANTHROPIC_API_KEY or OPENAI_API_KEY is set in environment.
provider = "anthropic"

# ── Memory / Storage ────────────────────────────────────────────────────────
[tools.storage]
default_backend = "sqlite"
db_path         = "/data/memory.db"

[memory]
default_backend    = "sqlite"
db_path            = "/data/memory.db"
context_top_k      = 5
context_min_score  = 0.3
context_max_tokens = 1500

# ── MCP ──────────────────────────────────────────────────────────────────────
[tools.mcp]
enabled = true
# To add MCP servers, uncomment and fill in:
# [[tools.mcp.servers]]
# name    = "filesystem"
# command = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/data"]
#
# [[tools.mcp.servers]]
# name    = "github"
# command = ["npx", "-y", "@modelcontextprotocol/server-github"]
# env     = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }

# ── Telemetry ────────────────────────────────────────────────────────────────
[telemetry]
enabled              = true
db_path              = "/data/telemetry.db"
gpu_metrics          = true    # pynvml installed in container image
gpu_poll_interval_ms = 100
energy_vendor        = ""      # auto-detect: nvidia | amd | apple | cpu_rapl

# ── Traces ───────────────────────────────────────────────────────────────────
[traces]
enabled = true
db_path = "/data/traces.db"

# ── Server ───────────────────────────────────────────────────────────────────
[server]
host  = "0.0.0.0"
port  = 8000
agent = "orchestrator"

# ── Scheduler ────────────────────────────────────────────────────────────────
# TaskScheduler daemon — polls SQLite every 60s for due tasks
[scheduler]
enabled       = true
db_path       = "/data/scheduler.db"
poll_interval = 60
default_agent = "orchestrator"   # tasks that omit 'agent' use this

# ── Security ─────────────────────────────────────────────────────────────────
# PII scanning + guardrails enabled; no sandboxing (personal hardware)
[security]
enabled = true

# ── Learning ─────────────────────────────────────────────────────────────────
# Traces are already collected — enable the feedback loop to improve routing
[learning]
enabled = true

[learning.routing]
policy = "heuristic"   # start with heuristic; switch to "learned" after ~500 traces

[learning.intelligence]
policy = "none"        # no fine-tuning yet — set to "sft" when LoRA deps available

[learning.agent]
policy = "none"        # AgentConfigEvolver disabled until baseline is established

[learning.metrics]
accuracy_weight   = 0.6
latency_weight    = 0.2
cost_weight       = 0.1
efficiency_weight = 0.1

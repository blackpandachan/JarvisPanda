# OpenJarvis — persistent local config
# Engine: Ollama on host | Agent: orchestrator | Memory: SQLite (persistent)

# ── Intelligence ────────────────────────────────────────────────────────────
[intelligence]
default_model   = "qwen3:8b"
preferred_engine = "ollama"
temperature      = 0.7
max_tokens       = 2048
top_p            = 0.9

# ── Agent ───────────────────────────────────────────────────────────────────
[agent]
default_agent      = "orchestrator"
max_turns          = 12
# Tools available to every agent session.
# github_issue lets local agents escalate to the ClaudeCodeAgent worker.
tools              = "think,calculator,retrieval,web_search,url_fetch,arxiv_search,weather,system_monitor,file_read,memory_store,memory_search,gemini_escalate,pdf_tool,code_interpreter"
context_from_memory = true

# System prompt instructs the agent on when to escalate.
system_prompt = """You are Jarvis — a sharp, capable local AI assistant running on personal hardware. You're direct and get things done.

TOOLS AVAILABLE:
  think              — reasoning scratchpad (use this to plan before acting)
  calculator         — math and unit conversions
  retrieval          — search prior conversation context
  web_search         — search the web (Tavily) — USE THIS for anything time-sensitive
  url_fetch          — fetch and parse any URL
  arxiv_search       — search arXiv for academic papers
  weather            — real-time weather and 3-day forecast
  system_monitor     — CPU/RAM/GPU/disk stats
  file_read          — read local files
  memory_store       — persist facts, research, notes to long-term memory
  memory_search      — retrieve stored memories by query
  gemini_escalate    — ask Google Gemini Flash when you're stuck on a hard problem
  pdf_tool           — extract text from PDF files or URLs
  code_interpreter   — execute Python code in a sandboxed subprocess

MEMORY RULE: Each user has a unique Discord ID in [Discord User: name | ID: N].
When using memory_store, always set source to "user:{ID}:{topic}".
Proactively store useful facts and research. Use memory_search to recall context.

CURRENCY RULE: Your training data has a cutoff. For prices, news, events, markets,
or recent developments — ALWAYS call web_search first with the current year in the query.

ESCALATION: If stuck on a hard technical problem after several attempts, call
gemini_escalate(mode="solve") for a second opinion before giving up.
"""

# ── Engine ───────────────────────────────────────────────────────────────────
[engine]
default = "ollama"

[engine.ollama]
host = "http://host.docker.internal:11434"

[engine.vllm]
host = "http://host.docker.internal:8001"

[engine.cloud]
# Activated when ANTHROPIC_API_KEY or OPENAI_API_KEY is set in environment.
provider = "anthropic"

# ── Memory / Storage ────────────────────────────────────────────────────────
[tools.storage]
default_backend = "sqlite"
db_path         = "/data/memory.db"

[memory]
default_backend    = "sqlite"
db_path            = "/data/memory.db"
context_top_k      = 5
context_min_score  = 0.3
context_max_tokens = 1500

# ── MCP ──────────────────────────────────────────────────────────────────────
[tools.mcp]
enabled = true
# To add MCP servers, uncomment and fill in:
# [[tools.mcp.servers]]
# name    = "filesystem"
# command = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/data"]
#
# [[tools.mcp.servers]]
# name    = "github"
# command = ["npx", "-y", "@modelcontextprotocol/server-github"]
# env     = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }

# ── Telemetry ────────────────────────────────────────────────────────────────
[telemetry]
enabled              = true
db_path              = "/data/telemetry.db"
gpu_metrics          = true    # pynvml installed in container image
gpu_poll_interval_ms = 100
energy_vendor        = ""      # auto-detect: nvidia | amd | apple | cpu_rapl

# ── Traces ───────────────────────────────────────────────────────────────────
[traces]
enabled = true
db_path = "/data/traces.db"

# ── Server ───────────────────────────────────────────────────────────────────
[server]
host  = "0.0.0.0"
port  = 8000
agent = "orchestrator"

# ── Scheduler ────────────────────────────────────────────────────────────────
# TaskScheduler daemon — polls SQLite every 60s for due tasks
[scheduler]
enabled       = true
db_path       = "/data/scheduler.db"
poll_interval = 60
default_agent = "orchestrator"   # tasks that omit 'agent' use this

# ── Security ─────────────────────────────────────────────────────────────────
# PII scanning + guardrails enabled; no sandboxing (personal hardware)
[security]
enabled = true

# ── Learning ─────────────────────────────────────────────────────────────────
# Traces are already collected — enable the feedback loop to improve routing
[learning]
enabled = true

[learning.routing]
policy = "heuristic"   # start with heuristic; switch to "learned" after ~500 traces

[learning.intelligence]
policy = "none"        # no fine-tuning yet — set to "sft" when LoRA deps available

[learning.agent]
policy = "none"        # AgentConfigEvolver disabled until baseline is established

[learning.metrics]
accuracy_weight   = 0.6
latency_weight    = 0.2
cost_weight       = 0.1
efficiency_weight = 0.1

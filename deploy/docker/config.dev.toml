[intelligence]
default_model = "qwen3:8b"
preferred_engine = "ollama"
temperature = 0.7
max_tokens = 1024

[agent]
default_agent = "simple"
context_from_memory = false

[engine]
default = "ollama"

[engine.ollama]
host = "http://host.docker.internal:11434"

[tools.storage]
default_backend = "sqlite"
db_path = "/root/.openjarvis/memory.db"

[telemetry]
enabled = false

[traces]
enabled = false

[security]
enabled = false

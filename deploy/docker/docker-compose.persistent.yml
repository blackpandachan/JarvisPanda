services:

  # ── Jarvis core API server ──────────────────────────────────────────────────
  jarvis-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dev
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./config.persistent.toml:/root/.openjarvis/config.toml:ro
      - jarvis-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Discord bot (runs full OpenJarvis SDK — local model, no API proxy) ───────
  jarvis-discord:
    build:
      context: ../..                          # needs src/ for openjarvis package
      dockerfile: deploy/discord/Dockerfile
    volumes:
      - ./config.persistent.toml:/root/.openjarvis/config.toml:ro
      - jarvis-data:/data                     # shared memory with jarvis-server
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach Ollama on host
    env_file: ../.env
    restart: unless-stopped
    # No dependency on jarvis-server — runs its own agent pipeline directly

  # ── HN AI digest scheduler ──────────────────────────────────────────────────
  jarvis-digest:
    build:
      context: ../digest
      dockerfile: Dockerfile
    volumes:
      - jarvis-reports:/reports
    env_file: ../.env
    restart: unless-stopped

  # ── Claude Code issue worker ────────────────────────────────────────────────
  jarvis-claude-worker:
    build:
      context: ../..
      dockerfile: deploy/claude-worker/Dockerfile
    volumes:
      - ./config.persistent.toml:/root/.openjarvis/config.toml:ro
      - jarvis-data:/data
      - ../..:/workspace                      # repo for ClaudeCodeAgent to work in
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: ../.env
    environment:
      WORKSPACE: "/workspace"
    restart: unless-stopped

volumes:
  jarvis-data:       # SQLite memory, telemetry, traces — persists across restarts
  jarvis-reports:    # HN digest markdown reports

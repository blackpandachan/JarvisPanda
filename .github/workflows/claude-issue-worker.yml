name: Gemini Issue Worker

# Triggered when a local agent labels an issue `claude-code-work`.
# Uses Gemini Flash to implement the fix, commits to a branch, opens a PR,
# and notifies Discord. No Anthropic API key required.

on:
  issues:
    types: [labeled]

jobs:
  gemini-fix:
    if: github.event.label.name == 'claude-code-work'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx

      - name: Implement fix with Gemini Flash
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/gemini_implement.py

      - name: Commit and push branch
        id: push
        if: steps.gemini.outcome == 'success'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
          BRANCH="gemini-fix/issue-${ISSUE_NUMBER}-${SLUG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          COMMIT_MSG=$(cat /tmp/commit_message.txt)
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Open pull request
        id: pr
        if: steps.push.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/summary.txt', 'utf8').trim();
            const branch = '${{ steps.push.outputs.branch }}';
            const issueNum = ${{ github.event.issue.number }};

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Gemini] ${{ github.event.issue.title }}`,
              body: `fixes #${issueNum}\n\n## Summary\n\n${summary}\n\n---\n*Implemented by Gemini Flash via JarvisPanda GitHub Actions.*\n*Review changes, then merge with \`!merge ${pr_number}\` in Discord or via GitHub UI.*`.replace('${pr_number}', ''),
              head: branch,
              base: 'main',
            });

            core.setOutput('pr_url', pr.data.html_url);
            core.setOutput('pr_number', String(pr.data.number));

      - name: Update issue labels
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const geminiOk = '${{ steps.gemini.outcome }}' === 'success';
            const pushOk   = '${{ steps.push.outcome }}'   === 'success';
            const success  = geminiOk && pushOk;
            const newLabel = success ? 'claude-code-in-progress' : 'claude-code-failed';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              labels: [newLabel],
            }).catch(() => {});

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              name: 'claude-code-work',
            }).catch(() => {});

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DIGEST_WEBHOOK }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          STATUS: ${{ steps.gemini.outcome }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then exit 0; fi
          SAFE_TITLE=$(echo "$ISSUE_TITLE" | sed 's/"/\\"/g')
          if [ "$STATUS" = "success" ] && [ -n "$PR_URL" ]; then
            COLOR=3066993
            TITLE="✅ Gemini opened PR #${PR_NUMBER} for issue #${ISSUE_NUMBER}"
            DESC="**${SAFE_TITLE}**\\n\\nPR: ${PR_URL}\\n\\nMerge with \`!merge ${PR_NUMBER}\` in Discord after reviewing."
          else
            COLOR=15158332
            TITLE="❌ Gemini failed on issue #${ISSUE_NUMBER}"
            DESC="**${SAFE_TITLE}**\\n\\nCould not automatically implement a fix. Manual review needed."
          fi
          curl -sf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"${TITLE}\",\"description\":\"${DESC}\",\"url\":\"${ISSUE_URL}\",\"color\":${COLOR}}]}"
